<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常ネタ出し箱 v0.2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📖 日常ネタ出し箱 v0.2</h1>

    <div id="app"></div>

    <div class="actions">
      <button id="reroll">🎲 全シャッフル</button>
      <button id="copy">📋 コピー</button>
    </div>
    <div class="actions"></div>
    <div class="actions">
        <button id="ai-generate">💡 AIでネタ生成</button></div>
         <div class="actions">
<input id="save-name" placeholder="タイトル（例：帰り道の気まずさ）">
<input id="save-memo" placeholder="メモ（任意）">
<button id="save-btn">⭐ 保存</button>
    </div>
    <div class="output">
      <pre id="result"></pre>
    </div>
   <div class="output">
    <h2>📚 保存リスト</h2>
<div id="saved"></div>
</div></div>
  <script src="app.js"></script>
</body>
</html>
